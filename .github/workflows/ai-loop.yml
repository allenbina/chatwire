name: AI Issue Loop

on:
  issues:
    types: [labeled]

jobs:
  handle-ai-ready:
    if: github.event.label.name == 'ai-ready'
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Node
        uses: actions/setup-node@v4
        with:
          node-version: 22

      - name: Install Claude Code
        run: npm install -g @anthropic-ai/claude-code

      - name: Run Claude Code on issue
        env:
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          ISSUE_NUMBER: ${{ github.event.issue.number }}
          ISSUE_TITLE: ${{ github.event.issue.title }}
          ISSUE_BODY: ${{ github.event.issue.body }}
        run: |
          BRANCH="ai/issue-${ISSUE_NUMBER}"
          git checkout -b "$BRANCH"
          git config user.name "claude-code[bot]"
          git config user.email "claude-code[bot]@users.noreply.github.com"

          claude -p \
            "You are working on issue #${ISSUE_NUMBER}: ${ISSUE_TITLE}

          ${ISSUE_BODY}

          Rules:
          - Make only the changes necessary to resolve this issue
          - If labeled 'regression', add a test that would have caught this bug
          - If labeled 'visual-bug', add a Playwright screenshot test
          - Commit your changes with a clear message referencing the issue
          - Do not modify unrelated files" \
            --permission-mode acceptEdits \
            --output-format text

          git push origin "$BRANCH"

          gh pr create \
            --title "fix: resolve issue #${ISSUE_NUMBER} — ${ISSUE_TITLE}" \
            --body "$(cat <<PRBODY
          Closes #${ISSUE_NUMBER}

          ## What changed
          $(git log --oneline origin/main..HEAD)
          PRBODY
          )" \
            --label "ai-needs-review"

          gh issue edit "${ISSUE_NUMBER}" --remove-label "ai-ready" --add-label "ai-in-progress"
