name: Publish to PyPI

# Triggered by pushing a tag like v1.7.0. Five-job pipeline:
#   1. build-frontend  — npm ci + npm run build in web/frontend/
#   2. build-python    — python -m build + twine check (embeds the frontend dist)
#   3. publish-pypi    — OIDC trusted publisher, no API token required
#   4. github-release  — softprops/action-gh-release, attaches .whl + .tar.gz,
#                        body extracted from CHANGELOG.md
#   5. homebrew-bump   — updates Formula/chatwire.rb in allenbina/homebrew-tap
#
# Authentication: API token (PYPI_API_TOKEN secret).
#   To create one: https://pypi.org/manage/account/token/
#   Scope: "Entire account" or limit to project "chatwire".
#   Then add it to the repo: Settings → Secrets → Actions → PYPI_API_TOKEN
#
# Alternative (OIDC Trusted Publisher — no secret needed):
#   https://pypi.org/manage/project/chatwire/settings/publishing/
#   Owner: allenbina   Repository: chatwire-dev
#   Workflow: publish.yml   Environment: pypi
#   Then swap the publish step back to OIDC (see comment in job 3).
#
# Required secrets:
#   PYPI_API_TOKEN     — PyPI API token scoped to the chatwire project
#   HOMEBREW_TAP_TOKEN — classic PAT with `repo` scope on allenbina/homebrew-tap
#                        (the default GITHUB_TOKEN can't write to other repos)

on:
  push:
    tags:
      - "v*.*.*"
  workflow_dispatch:  # also allow manual runs

jobs:
  # ─────────────────────────────────────────────────────────────────────────────
  # Job 1: Build the React frontend and upload dist/ as an artifact so the
  # Python build job can embed it into the wheel.
  # ─────────────────────────────────────────────────────────────────────────────
  build-frontend:
    name: Build React frontend
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "22"
          cache: "npm"
          cache-dependency-path: web/frontend/package-lock.json

      - name: Install dependencies
        working-directory: web/frontend
        run: npm ci

      - name: Build production bundle
        working-directory: web/frontend
        run: npm run build

      - name: Upload frontend dist
        uses: actions/upload-artifact@v7
        with:
          name: frontend-dist
          path: web/frontend/dist/
          # Keep for 7 days — only needed by the build-python job in this run.
          retention-days: 7

  # ─────────────────────────────────────────────────────────────────────────────
  # Job 2: Build the Python wheel + sdist.
  # pyproject.toml [tool.setuptools.package-data] already includes
  # web/frontend/dist/** so the artifact from Job 1 lands inside the wheel.
  # ─────────────────────────────────────────────────────────────────────────────
  build-python:
    name: Build Python wheel + sdist
    needs: build-frontend
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6

      - name: Download frontend dist
        uses: actions/download-artifact@v8
        with:
          name: frontend-dist
          path: web/frontend/dist/

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: "3.13"

      - name: Install build tools
        run: python -m pip install --upgrade build twine

      - name: Build sdist + wheel
        run: python -m build

      - name: Verify distribution metadata
        run: twine check --strict dist/*

      - name: Upload dist artifacts
        uses: actions/upload-artifact@v7
        with:
          name: dist
          path: dist/
          retention-days: 7

  # ─────────────────────────────────────────────────────────────────────────────
  # Job 3: Publish to PyPI via API token secret.
  # Requires PYPI_API_TOKEN in the repo's GitHub Actions secrets.
  #
  # To switch back to OIDC Trusted Publisher (no secret needed):
  #   1. Add the publisher on PyPI (see top-of-file comment for exact settings).
  #   2. Remove `password:` from the publish step below.
  #   3. Restore `id-token: write` permission and `environment: pypi`.
  # ─────────────────────────────────────────────────────────────────────────────
  publish-pypi:
    name: Publish to PyPI
    needs: build-python
    runs-on: ubuntu-latest
    environment:
      name: pypi
      url: https://pypi.org/p/chatwire
    permissions:
      id-token: write  # kept for optional OIDC attestation metadata

    steps:
      - name: Download dist artifacts
        uses: actions/download-artifact@v8
        with:
          name: dist
          path: dist/

      - name: Publish to PyPI
        uses: pypa/gh-action-pypi-publish@release/v1
        with:
          password: ${{ secrets.PYPI_API_TOKEN }}

  # ─────────────────────────────────────────────────────────────────────────────
  # Job 4: Create a GitHub Release with the wheel + sdist attached.
  # Release body is extracted from CHANGELOG.md for the matching version
  # (falls back to [Unreleased] if no versioned section exists yet).
  # Runs after PyPI publish succeeds so a failed upload doesn't create a
  # misleading Release.
  # ─────────────────────────────────────────────────────────────────────────────
  github-release:
    name: Create GitHub Release
    needs: publish-pypi
    runs-on: ubuntu-latest
    permissions:
      contents: write  # create releases and upload assets

    steps:
      - uses: actions/checkout@v6

      - name: Download dist artifacts
        uses: actions/download-artifact@v8
        with:
          name: dist
          path: dist/

      - name: Extract changelog section
        run: |
          VERSION="${GITHUB_REF_NAME#v}"
          # Try version-specific section first (e.g. ## [1.7.0])
          BODY=$(awk "/^## \[${VERSION}\]/{found=1; next} found && /^## /{exit} found{print}" CHANGELOG.md)
          # Fall back to [Unreleased] if no versioned section found
          if [ -z "$(echo "$BODY" | tr -d '[:space:]')" ]; then
            BODY=$(awk '/^## \[Unreleased\]/{found=1; next} found && /^## /{exit} found{print}' CHANGELOG.md)
          fi
          # If still empty, provide a minimal placeholder
          if [ -z "$(echo "$BODY" | tr -d '[:space:]')" ]; then
            BODY="See [CHANGELOG.md](https://github.com/${{ github.repository }}/blob/${{ github.ref_name }}/CHANGELOG.md) for details."
          fi
          printf '%s\n' "$BODY" > /tmp/release-notes.md
          echo "--- release notes ---"
          cat /tmp/release-notes.md

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          body_path: /tmp/release-notes.md
          files: |
            dist/*.whl
            dist/*.tar.gz

  # ─────────────────────────────────────────────────────────────────────────────
  # Job 5: Bump the chatwire formula in allenbina/homebrew-tap.
  # dawidd6/action-homebrew-bump-formula fetches the new version's sdist from
  # PyPI, calculates sha256, updates Formula/chatwire.rb, and pushes directly
  # (push: true) since Allen owns the tap.
  #
  # Requires secret: HOMEBREW_TAP_TOKEN (classic PAT, `repo` scope on the tap).
  # ─────────────────────────────────────────────────────────────────────────────
  homebrew-bump:
    name: Bump Homebrew tap
    needs: github-release
    runs-on: ubuntu-latest

    steps:
      - name: Bump chatwire formula in allenbina/homebrew-tap
        uses: dawidd6/action-homebrew-bump-formula@v3
        with:
          token: ${{ secrets.HOMEBREW_TAP_TOKEN }}
          tap: allenbina/homebrew-tap
          formula: chatwire
          # push: true — commit directly to the tap instead of opening a PR.
          # Remove this line if you prefer a PR for each release.
          push: true
