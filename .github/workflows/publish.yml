name: Publish to PyPI

# Triggered by pushing a v* tag (e.g. v1.7.0). Three-job pipeline:
#   1. build        — npm ci + npm run build + python -m build
#   2. publish      — OIDC trusted publisher → PyPI + GitHub Release w/ assets
#   3. homebrew-bump — bumps Formula/chatwire.rb in allenbina/homebrew-tap
#
# One-time PyPI setup (https://pypi.org/manage/project/chatwire/settings/publishing/):
#   Project: chatwire   Owner: allenbina
#   Repository: chatwire   Workflow: publish.yml   Environment: pypi
#
# Required secrets:
#   HOMEBREW_TAP_TOKEN — classic PAT with `repo` scope on allenbina/homebrew-tap

on:
  push:
    tags:
      - "v*"

jobs:
  build:
    name: Build distribution
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "22"
          cache: "npm"
          cache-dependency-path: web/frontend/package-lock.json

      - name: Build React frontend
        working-directory: web/frontend
        run: |
          npm ci
          npm run build

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: "3.13"

      - name: Install build tools
        run: python -m pip install --upgrade build twine

      - name: Build sdist + wheel
        run: python -m build

      - name: Verify distribution metadata
        run: twine check --strict dist/*

      - name: Upload dist artifacts
        uses: actions/upload-artifact@v7
        with:
          name: dist
          path: dist/
          retention-days: 7

  publish:
    name: Publish to PyPI
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: pypi
      url: https://pypi.org/p/chatwire
    permissions:
      id-token: write   # OIDC token for PyPI trusted publisher
      contents: write   # create GitHub releases

    steps:
      - uses: actions/checkout@v5

      - name: Download dist artifacts
        uses: actions/download-artifact@v8
        with:
          name: dist
          path: dist/

      - name: Publish to PyPI
        uses: pypa/gh-action-pypi-publish@release/v1

      - name: Extract changelog section
        run: |
          VERSION="${GITHUB_REF_NAME#v}"
          BODY=$(awk "/^## \\[${VERSION}\\]/{found=1; next} found && /^## /{exit} found{print}" CHANGELOG.md)
          if [ -z "$(echo "$BODY" | tr -d '[:space:]')" ]; then
            BODY=$(awk '/^## \\[Unreleased\\]/{found=1; next} found && /^## /{exit} found{print}' CHANGELOG.md)
          fi
          if [ -z "$(echo "$BODY" | tr -d '[:space:]')" ]; then
            BODY="See CHANGELOG.md for details."
          fi
          printf '%s\n' "$BODY" > /tmp/release-notes.md

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          body_path: /tmp/release-notes.md
          files: |
            dist/*.whl
            dist/*.tar.gz

  homebrew-bump:
    name: Bump Homebrew tap
    needs: publish
    runs-on: ubuntu-latest
    steps:
      - name: Bump chatwire formula in allenbina/homebrew-tap
        uses: dawidd6/action-homebrew-bump-formula@v3
        with:
          token: ${{ secrets.HOMEBREW_TAP_TOKEN }}
          tap: allenbina/homebrew-tap
          formula: chatwire
          push: true

  notify-failure:
    name: Notify on failure
    needs: [build, publish, homebrew-bump]
    if: failure()
    runs-on: ubuntu-latest
    steps:
      - name: Send ntfy alert
        run: |
          curl -s \
            -H "Title: CI FAILED: ${{ github.workflow }} (${{ github.ref_name }})" \
            -H "Priority: high" \
            -H "Tags: x,robot_face" \
            -d "Run: ${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}" \
            ntfy.sh/p9SKpYzY70LlyK1N
