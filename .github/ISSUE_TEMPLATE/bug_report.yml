name: Bug Report
description: Something is broken or not rendering correctly
labels: ["bug"]
body:
  - type: markdown
    attributes:
      value: |
        Before filing, search existing issues to avoid duplicates.
  - type: textarea
    id: description
    attributes:
      label: What happened?
      description: Be specific.  What did you expect vs what occurred?
    validations:
      required: true
  - type: textarea
    id: steps
    attributes:
      label: Steps to reproduce
    validations:
      required: true
  - type: textarea
    id: context
    attributes:
      label: Context (OS, app version, relevant config)
    validations:
      required: false
  - type: textarea
    id: discussion_summary
    attributes:
      label: Discussion summary (if applicable)
      description: |
        If this issue was discussed in Claude Code, Discord, or elsewhere, paste
        a compacted summary of the decision here including what was ruled out.
    validations:
      required: false
