name: Feature Request
description: Request a new capability or improvement
labels: ["feature"]
body:
  - type: textarea
    id: problem
    attributes:
      label: What problem does this solve?
    validations:
      required: true
  - type: textarea
    id: proposal
    attributes:
      label: Proposed solution
    validations:
      required: true
  - type: textarea
    id: alternatives
    attributes:
      label: Alternatives considered
    validations:
      required: false
  - type: textarea
    id: discussion_summary
    attributes:
      label: Discussion summary (if applicable)
      description: Paste a compacted Claude or Discord conversation summary here.
    validations:
      required: false
