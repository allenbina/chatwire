<ul id="wl-rows" class="wl-rows divide-y divide-app-border-subtle">
  {% if not rows %}
  <li class="empty py-4 text-sm text-app-text-faint text-center">whitelist empty</li>
  {% endif %}
  {% for r in rows %}
  {% if r.kind == "group" %}
  <li class="flex items-center gap-2 py-2 text-sm wl-group">
    <span class="wl-name font-medium text-app-text truncate flex-1">[Group] {{ r.name }}</span>
    <span class="wl-handle text-xs text-app-text-muted font-mono truncate">{{ r.members }} members</span>
    <span class="wl-cap {{ r.cap_class }} text-xs px-1.5 py-0.5 rounded font-medium">{{ r.capability }}</span>
    <form hx-post="/whitelist/remove" hx-target="#wl-rows" hx-swap="outerHTML" class="wl-remove-form">
      <input type="hidden" name="guid" value="{{ r.guid }}">
      <button type="submit"
              class="wl-remove-btn ml-auto p-1 text-app-text-faint hover:text-app-danger rounded"
              title="remove">
        <svg class="w-4 h-4" fill="none" stroke="currentColor" stroke-width="2"
             viewBox="0 0 24 24">
          <line x1="18" y1="6" x2="6" y2="18"/>
          <line x1="6" y1="6" x2="18" y2="18"/>
        </svg>
      </button>
    </form>
  </li>
  {% else %}
  <li class="flex items-center gap-2 py-2 text-sm">
    <span class="wl-name font-medium text-app-text truncate flex-1">{{ r.name or "(no contact name)" }}</span>
    <span class="wl-handle text-xs text-app-text-muted font-mono truncate">{{ r.handle }}</span>
    <span class="wl-cap {{ r.cap_class }} text-xs px-1.5 py-0.5 rounded font-medium" title="iMessage vs SMS capability based on chat.db history">{{ r.capability }}</span>
    <form hx-post="/whitelist/remove" hx-target="#wl-rows" hx-swap="outerHTML" class="wl-remove-form">
      <input type="hidden" name="handle" value="{{ r.handle }}">
      <button type="submit"
              class="wl-remove-btn ml-auto p-1 text-app-text-faint hover:text-app-danger rounded"
              title="remove">
        <svg class="w-4 h-4" fill="none" stroke="currentColor" stroke-width="2"
             viewBox="0 0 24 24">
          <line x1="18" y1="6" x2="6" y2="18"/>
          <line x1="6" y1="6" x2="18" y2="18"/>
        </svg>
      </button>
    </form>
  </li>
  {% endif %}
  {% endfor %}
</ul>
