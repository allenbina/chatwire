<ul id="fav-rows" class="space-y-1">
  {% for h in favorites %}
  <li class="flex items-center justify-between gap-2 px-2 py-1 bg-app-surface-alt rounded text-sm">
    <span class="text-app-text truncate">{{ h }}</span>
    <form hx-post="/api/favorites/remove"
          hx-target="#sidebar"
          hx-swap="innerHTML"
          class="flex-shrink-0">
      <input type="hidden" name="handle" value="{{ h }}">
      <button type="submit"
              class="text-xs text-app-text-muted hover:text-red-500 px-2 py-0.5 rounded hover:bg-app-surface-hover transition-colors">
        Remove
      </button>
    </form>
  </li>
  {% else %}
  <li class="text-xs text-app-text-muted italic py-1">No favorites yet.</li>
  {% endfor %}
</ul>
