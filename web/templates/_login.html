<!doctype html>
<html lang="en" data-theme="{{ web_theme }}">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover">
  <title>iMessage bridge — sign in</title>
  <link rel="icon" type="image/svg+xml" href="/static/favicon.svg">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">
  <script src="https://cdn.tailwindcss.com"></script>
  <script>
    tailwind.config = {
      theme: {
        extend: {
          fontFamily: { sans: ['Inter', 'ui-sans-serif', 'system-ui', '-apple-system', 'sans-serif'] },
          colors: {
            app: {
              bg: 'var(--app-color-bg)', surface: 'var(--app-color-surface)',
              'surface-alt': 'var(--app-color-surface-alt)', border: 'var(--app-color-border)',
              text: 'var(--app-color-text)', 'text-subtle': 'var(--app-color-text-subtle)',
              'text-muted': 'var(--app-color-text-muted)', 'text-faint': 'var(--app-color-text-faint)',
              primary: 'var(--app-color-primary)', 'primary-hover': 'var(--app-color-primary-hover)',
              'on-primary': 'var(--app-color-on-primary)',
              danger: 'var(--app-color-danger)', 'danger-bg': 'var(--app-color-danger-bg)',
              'danger-border': 'var(--app-color-danger-border)',
            },
          },
        },
      },
    }
  </script>
  <link href="https://cdn.jsdelivr.net/npm/flowbite@4.0.1/dist/flowbite.min.css" rel="stylesheet">
  <link rel="stylesheet" href="/static/themes/_bridge.css?v={{ version }}">
  <link rel="stylesheet" href="/static/themes/{{ web_theme }}.css?v={{ version }}">
  <link rel="stylesheet" href="/static/style.css?v={{ version }}">
</head>
<body class="bg-app-bg min-h-screen flex items-center justify-center font-sans">
  <div class="bg-app-surface rounded-lg shadow-md max-w-sm w-full p-6 mx-auto">
    <h1 class="text-2xl font-bold text-app-text mb-1">iMessage bridge</h1>
    <p class="text-sm text-app-text-muted mb-5">Sign in to continue.</p>
    {% if error %}
    <div class="bg-app-danger-bg border border-app-danger-border text-app-danger text-sm rounded-lg p-3 mb-4" role="alert">{{ error }}</div>
    {% endif %}
    <form method="post" action="/login" autocomplete="on">
      <input type="hidden" name="next" value="{{ next }}">
      <input type="hidden" name="csrf_token" value="{{ csrf_token }}">
      <div class="mb-4">
        <label class="block mb-2 text-sm font-medium text-app-text" for="password">Password</label>
        <input type="password" id="password" name="password" autocomplete="current-password"
               autofocus required
               class="bg-app-surface-alt border border-app-border text-app-text text-sm rounded-lg focus:ring-blue-500 focus:border-blue-500 block w-full p-2.5">
      </div>
      <button type="submit" class="w-full text-app-on-primary bg-app-primary hover:bg-app-primary-hover font-medium rounded-lg text-sm px-5 py-2.5">Sign in</button>
    </form>
    <p class="text-center text-xs text-app-text-faint mt-4">v{{ release_version }}</p>
  </div>
  <script src="https://cdn.jsdelivr.net/npm/flowbite@4.0.1/dist/flowbite.min.js"></script>
</body>
</html>
