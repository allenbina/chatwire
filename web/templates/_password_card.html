<div id="password-card">
  {% if has_password %}
  <p class="flex items-center gap-1.5 text-sm text-app-success mb-3">
    <svg class="w-4 h-4" fill="currentColor" viewBox="0 0 24 24">
      <path d="M12 1a5 5 0 0 0-5 5v3H5a2 2 0 0 0-2 2v10a2 2 0 0 0 2 2h14a2 2 0 0 0 2-2V11a2 2 0 0 0-2-2h-2V6a5 5 0 0 0-5-5zm0 2a3 3 0 0 1 3 3v3H9V6a3 3 0 0 1 3-3zm0 9a2 2 0 1 1 0 4 2 2 0 0 1 0-4z"/>
    </svg>
    Password protection is <strong>on</strong>.
  </p>
  <form class="pw-form space-y-3"
        hx-post="/api/auth/password"
        hx-target="#password-card"
        hx-swap="outerHTML">
    <input type="hidden" name="csrf_token" value="{{ csrf_token }}">
    <label class="flex flex-col gap-1 text-sm text-app-text-subtle">
      <span class="font-medium">Current password</span>
      <input type="password" name="current_password" autocomplete="current-password" required
             class="block py-2 px-3 text-sm text-app-text bg-app-surface-alt border border-app-border rounded-lg focus:ring-blue-500 focus:border-blue-500">
    </label>
    <label class="flex flex-col gap-1 text-sm text-app-text-subtle">
      <span class="font-medium">New password <span class="font-normal text-app-text-faint">(leave blank to remove)</span></span>
      <input type="password" name="new_password" autocomplete="new-password" minlength="6"
             class="block py-2 px-3 text-sm text-app-text bg-app-surface-alt border border-app-border rounded-lg focus:ring-blue-500 focus:border-blue-500">
    </label>
    <div class="flex gap-2">
      <button type="submit"
              class="px-4 py-2 text-sm font-medium text-app-on-primary bg-app-primary rounded-lg hover:bg-app-primary-hover focus:ring-4 focus:ring-blue-300">
        Change
      </button>
      <button type="submit" name="clear" value="1"
              class="px-4 py-2 text-sm font-medium text-white bg-red-600 rounded-lg hover:bg-red-700 focus:ring-4 focus:ring-red-300">
        Remove
      </button>
    </div>
  </form>
  <p class="mt-3 text-xs text-app-text-muted"><a href="/logout" class="text-app-primary hover:underline">Sign out of this browser</a></p>
  {% else %}
  <p class="flex items-center gap-1.5 text-sm text-app-warning mb-3">
    <svg class="w-4 h-4" fill="currentColor" viewBox="0 0 24 24">
      <path d="M12 1a5 5 0 0 0-5 5h2a3 3 0 0 1 6 0v3H5a2 2 0 0 0-2 2v10a2 2 0 0 0 2 2h14a2 2 0 0 0 2-2V11a2 2 0 0 0-2-2H9V6a5 5 0 0 0-5-5z"/>
    </svg>
    No password set — anyone who can reach this URL can read and send.
  </p>
  <form class="pw-form space-y-3"
        hx-post="/api/auth/password"
        hx-target="#password-card"
        hx-swap="outerHTML">
    <input type="hidden" name="csrf_token" value="{{ csrf_token }}">
    <label class="flex flex-col gap-1 text-sm text-app-text-subtle">
      <span class="font-medium">Set a password (6+ characters)</span>
      <input type="password" name="new_password" autocomplete="new-password" minlength="6" required
             class="block py-2 px-3 text-sm text-app-text bg-app-surface-alt border border-app-border rounded-lg focus:ring-blue-500 focus:border-blue-500">
    </label>
    <button type="submit"
            class="px-4 py-2 text-sm font-medium text-app-on-primary bg-app-primary rounded-lg hover:bg-app-primary-hover focus:ring-4 focus:ring-blue-300">
      Set password
    </button>
  </form>
  <p class="mt-3 text-xs text-app-text-muted">
    Forgot it? Stop the web agent, edit <code class="text-xs bg-app-surface-alt px-1 py-0.5 rounded">~/.chatwire/config.json</code>, remove the <code class="text-xs bg-app-surface-alt px-1 py-0.5 rounded">web.auth</code> block, restart.
  </p>
  {% endif %}
</div>
