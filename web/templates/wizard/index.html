<!doctype html>
<html lang="en" data-theme="{{ web_theme }}">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover">
  <title>iMessage bridge — setup</title>
  <link rel="icon" type="image/svg+xml" href="/static/favicon.svg">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">
  <script src="https://cdn.tailwindcss.com"></script>
  <script>
    tailwind.config = {
      theme: {
        extend: {
          fontFamily: { sans: ['Inter', 'ui-sans-serif', 'system-ui', '-apple-system', 'sans-serif'] },
          colors: {
            app: {
              bg: 'var(--app-color-bg)', surface: 'var(--app-color-surface)',
              'surface-alt': 'var(--app-color-surface-alt)', 'surface-hover': 'var(--app-color-surface-hover)',
              border: 'var(--app-color-border)', 'border-subtle': 'var(--app-color-border-subtle)',
              text: 'var(--app-color-text)', 'text-subtle': 'var(--app-color-text-subtle)',
              'text-muted': 'var(--app-color-text-muted)', 'text-faint': 'var(--app-color-text-faint)',
              primary: 'var(--app-color-primary)', 'primary-hover': 'var(--app-color-primary-hover)',
              'on-primary': 'var(--app-color-on-primary)',
              success: 'var(--app-color-success)', 'success-bg': 'var(--app-color-success-bg)',
              warning: 'var(--app-color-warning)', 'warning-bg': 'var(--app-color-warning-bg)',
              danger: 'var(--app-color-danger)', 'danger-bg': 'var(--app-color-danger-bg)',
              'danger-border': 'var(--app-color-danger-border)',
            },
          },
        },
      },
    }
  </script>
  <link href="https://cdn.jsdelivr.net/npm/flowbite@4.0.1/dist/flowbite.min.css" rel="stylesheet">
  <link rel="stylesheet" href="/static/themes/_bridge.css">
  <link rel="stylesheet" href="/static/themes/{{ web_theme }}.css">
  <link rel="stylesheet" href="/static/style.css">
  <script src="https://unpkg.com/htmx.org@1.9.10" defer></script>
  <script src="https://cdn.jsdelivr.net/npm/flowbite@4.0.1/dist/flowbite.min.js" defer></script>
</head>
<body class="min-h-screen bg-app-bg font-sans">
  <div class="flex h-screen overflow-hidden">
    <aside class="w-56 flex-shrink-0 bg-app-surface border-r border-app-border flex flex-col p-6 overflow-y-auto">
      <h1 class="text-lg font-bold text-app-text mb-6">Setup</h1>
      <ol class="space-y-1 flex-1">
        {% for s in steps %}
        <li>
          <a href="/setup?step={{ s }}"
             hx-get="/setup/step/{{ s }}"
             hx-target="#wizard"
             hx-swap="innerHTML"
             class="flex items-center gap-3 px-3 py-2 rounded-lg text-sm
                    {% if s == step %}bg-blue-50 text-blue-700 font-semibold
                    {% elif loop.index0 < step_index %}text-green-700 hover:bg-gray-100
                    {% else %}text-gray-600 hover:bg-gray-100{% endif %}">
            <span class="w-6 h-6 rounded-full flex items-center justify-center text-xs font-bold flex-shrink-0
                         {% if loop.index0 < step_index %}bg-green-100 text-green-700
                         {% elif s == step %}bg-blue-100 text-blue-700
                         {% else %}bg-gray-100 text-gray-500{% endif %}">
              {% if loop.index0 < step_index %}✓{% else %}{{ loop.index }}{% endif %}
            </span>
            <span class="truncate">{{ step_titles[s] }}</span>
          </a>
        </li>
        {% endfor %}
      </ol>
      <p class="text-xs text-gray-400 mt-6">
        Once configured, the main UI is at <a href="/" class="text-blue-600 hover:underline">/</a>.
      </p>
    </aside>

    <main id="wizard" class="flex-1 overflow-y-auto p-8">
      {% include "wizard/_" + step + ".html" %}
    </main>
  </div>
</body>
</html>
